name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:                                                                                                        
  contents: read                                                                                                    
  pages: write                                                                                                      
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest           # fresh Linux VM from GitHub

    steps:
      - name: Checkout repository    # Step 1: clone the repo into the VM
        uses: actions/checkout@v4

      - name: Setup Node.js          # Step 2: install Node.js (npm comes with it)
        uses: actions/setup-node@v4
        with:
          node-version: 20           # match your local Node version

      - name: Install dependencies   # Step 3: npm install
        run: npm install

      - name: Build                  # Step 4: produce the dist/ folder
        run: npm run build

      - name: Uplaod Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Portfolio to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
